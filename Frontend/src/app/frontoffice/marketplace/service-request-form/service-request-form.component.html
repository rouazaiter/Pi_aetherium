<div class="form-container">
  <h2>{{ isEdit ? 'Modifier la demande' : 'Publier une demande de service' }}</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="name">Titre *</label>
      <input id="name" type="text" formControlName="name" placeholder="Nom de la demande" />
      <span class="error" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
        Le titre est requis.
      </span>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" formControlName="description" rows="4" placeholder="Décrivez votre besoin..."></textarea>
    </div>

    <div class="form-group">
      <label for="expiringDate">Date d'expiration</label>
      <input id="expiringDate" type="datetime-local" formControlName="expiringDate" />
    </div>

    <div class="form-group">
      <label for="file">Fichier joint (PDF, image...)</label>
      <input id="file" type="file" (change)="onFileChange($event)" accept=".pdf,.png,.jpg,.doc,.docx" />
    </div>

    <div *ngIf="error" class="error">{{ error }}</div>
    <div *ngIf="success" class="success">{{ success }}</div>

    <div class="form-actions">
      <button type="submit" class="btn-primary" [disabled]="form.invalid || loading">
        {{ loading ? 'Envoi...' : (isEdit ? 'Mettre à jour' : 'Publier') }}
      </button>
      <a routerLink="/marketplace" class="btn-secondary">Annuler</a>
    </div>
  </form>
</div>

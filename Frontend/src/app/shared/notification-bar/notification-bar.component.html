<div class="nav-notifications" *ngIf="currentUser$ | async as user">
  <button type="button" class="nav-notification-toggle" (click)="toggle($event)" [attr.aria-expanded]="isOpen">
    <i class="fa fa-bell"></i>
    <span class="notification-dot" *ngIf="((unreadCount$ | async) ?? 0) > 0"></span>
    <span class="notification-count">{{ (unreadCount$ | async) ?? 0 }}</span>
  </button>

  <div class="nav-notification-dropdown" *ngIf="isOpen">
    <div class="nav-notification-header">
      <div>
        <h4>Notifications</h4>
        <small>Active session: {{ user.username }}</small>
      </div>
      <button type="button" class="clear-button" (click)="clear()">Clear all</button>
    </div>

    <div class="notification-list" *ngIf="notifications$ | async as notifications">
      <p class="notification-empty" *ngIf="notifications.length === 0">
        No notifications yet.
      </p>

      <article class="notification-item" *ngFor="let notification of notifications">
        <div class="notification-top-row">
          <span class="arrival-pill">New</span>
          <span class="priority-pill" [ngClass]="'priority-' + (notification.priority || 'LOW').toLowerCase()">
            {{ notification.priority || 'LOW' }}
          </span>
        </div>
        <p>{{ notification.message }}</p>
        <small class="suggested-action" *ngIf="notification.suggestedAction">
          Suggested action: {{ notification.suggestedAction }}
        </small>
        <small>{{ notification.type }} • {{ notification.createdAt | date:'short' }}</small>
      </article>
    </div>
  </div>
</div>

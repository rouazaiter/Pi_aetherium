<header class="app-nav">
  <div class="container app-nav__inner">
    <a routerLink="/" class="app-nav__brand" (click)="closeNav()">
      <span class="app-nav__brand-mark">S</span>
      <span class="app-nav__brand-text">Scholar</span>
    </a>

    <button
      type="button"
      class="app-nav__toggle"
      [class.app-nav__toggle--open]="navOpen()"
      [attr.aria-expanded]="navOpen()"
      aria-controls="app-nav-menu"
      aria-label="Ouvrir ou fermer le menu"
      (click)="toggleNav()"
    >
      <span class="app-nav__toggle-bar"></span>
      <span class="app-nav__toggle-bar"></span>
      <span class="app-nav__toggle-bar"></span>
    </button>

    @if (navOpen()) {
      <div class="app-nav__backdrop" (click)="closeNav()" aria-hidden="true"></div>
    }

    <nav id="app-nav-menu" class="app-nav__menu" [class.app-nav__menu--open]="navOpen()">
      <a
        routerLink="/"
        routerLinkActive="app-nav__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="app-nav__link"
        (click)="closeNav()"
      >
        Accueil
      </a>

      @if (auth.isLoggedIn()) {
        <a
          routerLink="/profile"
          class="app-nav__avatar-link"
          [attr.aria-label]="'Mon profil'"
          (click)="closeNav()"
        >
          @if (navAvatarUrl() && !navAvatarImgError()) {
            <img [src]="navAvatarUrl()" alt="" (error)="navAvatarImgError.set(true)" />
          } @else {
            <span class="app-nav__avatar-fallback">{{ navAvatarInitials() }}</span>
          }
        </a>
        <a routerLink="/profile" routerLinkActive="app-nav__link--active" class="app-nav__link" (click)="closeNav()">Profil</a>
        <a routerLink="/subscriptions" routerLinkActive="app-nav__link--active" class="app-nav__link" (click)="closeNav()">Abonnements</a>
        <a routerLink="/friends" routerLinkActive="app-nav__link--active" class="app-nav__link" (click)="closeNav()">Amis</a>
        <button type="button" class="app-nav__link app-nav__link--btn" (click)="logout(); closeNav()">Déconnexion</button>
      } @else {
        <a routerLink="/login" routerLinkActive="app-nav__link--active" class="app-nav__link" (click)="closeNav()">Connexion</a>
        <a routerLink="/register" routerLinkActive="app-nav__link--active" class="app-nav__cta" (click)="closeNav()">Inscription</a>
      }
    </nav>
  </div>
</header>

<main class="page-content">
  <router-outlet />
</main>

<footer class="app-footer">
  <div class="container">Plateforme éducative</div>
</footer>

<app-welcome-dialog />

<div class="social-login" [class.social-login--flush]="flushTop">
  @if (errorMsg) {
    <div class="alert alert-danger small py-2 mb-2" role="alert">{{ errorMsg }}</div>
  }
  @if (loading) {
    <p class="small text-muted mb-2">Connexion en cours…</p>
  }
  @if (hasGoogle || hasFacebook) {
    @if (showGoogleHeading && hasGoogle) {
      <h3 class="h6 text-center mb-2">Se connecter avec Google</h3>
    } @else {
      <p class="small text-secondary mb-2 text-center">Ou continuer avec</p>
    }
    <div class="d-flex flex-column gap-2 align-items-stretch">
      @if (hasGoogle) {
        <div #googleHost class="google-btn-host d-flex justify-content-center"></div>
      }
      @if (hasFacebook) {
        <button
          type="button"
          class="btn btn-primary w-100"
          style="background: #1877f2; border-color: #1877f2"
          (click)="facebookLogin()"
          [disabled]="loading || !fbReady"
        >
          @if (!fbReady) {
            Chargement Facebook…
          } @else {
            Continuer avec Facebook
          }
        </button>
      }
    </div>
  }
</div>

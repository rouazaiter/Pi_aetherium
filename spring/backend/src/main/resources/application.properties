spring.application.name=education-platform-backend

# Uploads (photos de profil) — dossier créé au premier envoi
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
app.uploads.profile-pictures-dir=uploads/profile-pictures

# Si "Port 8080 was already in use" : autre app utilise 8080 — utilise 8081 ou libère 8080 (voir message d'erreur IntelliJ)
server.port=8081

# --- MySQL (XAMPP) — visible dans phpMyAdmin ---
# 1) Démarre Apache + MySQL dans le panneau XAMPP
# 2) Crée la base "educationdb" dans phpMyAdmin (Onglet SQL : CREATE DATABASE educationdb;)
#    ou laisse createDatabaseIfNotExist=true ci-dessous pour la créer au premier démarrage
spring.datasource.url=jdbc:mysql://localhost:3306/educationdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Noms du diagramme (User, Profile, etc.) : guillemets / backticks selon le dialecte
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# JWT (en prod: utiliser une variable d'environnement)
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000


spring.application.name=education-platform-backend
spring.config.import=optional:file:./.env.local[.properties]

# Uploads (photos de profil) — dossier créé au premier envoi
spring.servlet.multipart.max-file-size=3MB
spring.servlet.multipart.max-request-size=3MB
app.uploads.profile-pictures-dir=uploads/profile-pictures
app.uploads.voice-messages-dir=uploads/voice-messages

# Si "Port 8080 was already in use" : autre app utilise 8080 — utilise 8089 ou libère 8080 (voir message d'erreur IntelliJ)
server.port=8089

# --- MySQL (XAMPP) — visible dans phpMyAdmin ---
# 1) Démarre Apache + MySQL dans le panneau XAMPP
# 2) Crée la base "educationdb" dans phpMyAdmin (Onglet SQL : CREATE DATABASE educationdb;)
#    ou laisse createDatabaseIfNotExist=true ci-dessous pour la créer au premier démarrage
spring.datasource.url=jdbc:mysql://localhost:3306/educationdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Noms du diagramme (User, Profile, etc.) : guillemets / backticks selon le dialecte
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
# Important for long-lived SSE endpoints (/api/messages/stream):
# avoids holding persistence context/DB resources for the whole HTTP response.
spring.jpa.open-in-view=false

# Hikari resilience (prevents long UI freeze when DB is saturated)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000


# Server Configuration
server.port=8080

# Database Configuration (configure for your database)
spring.datasource.url=jdbc:h2:mem:roomdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Upload Directory
app.upload.directory=./uploads/recordings
app.recordings.directory=./recordings

# Agora Configuration (get from https://console.agora.io/)
agora.app.id=961e6f4dafa443ad80dff551c05c31fc
agora.app.certificate=a7429963072f40378d764f007774c981
agora.token.expiry=3600

# Whiteboard Configuration (Agora Interactive Whiteboard / Netless)
# Required on client init
whiteboard.app-identifier=${WHITEBOARD_APP_IDENTIFIER:}
# Preferred on server REST calls; if empty, server derives SDK token from AK/SK
whiteboard.sdk-token=${WHITEBOARD_SDK_TOKEN:}
# Optional fallback for SDK token derivation
whiteboard.ak=${WHITEBOARD_AK:}
whiteboard.sk=${WHITEBOARD_SK:}
# Must match your whiteboard project data center (for example: eu, us-sv, cn-hz)
whiteboard.region=${WHITEBOARD_REGION:eu}

# CORS Configuration (comma-separated list)
app.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200

spring.application.name=portfolio

# Connexion MySQL avec création automatique de la base

# Logging
logging.level.org.hibernate=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.hbm2ddl=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.skillhub.portfolio_skillhub=DEBUG
spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=ADMIN
# MySQL Connection
spring.datasource.url=jdbc:mysql://localhost:3306/skillhub_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Configuration pour servir les fichiers statiques
spring.web.resources.static-locations=classpath:/static/,file:uploads/
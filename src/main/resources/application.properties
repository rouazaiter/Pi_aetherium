spring.application.name=portfolio_skillhub

# Connexion MySQL avec création automatique de la base
spring.datasource.url=jdbc:mysql://localhost:3306/skillhub_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true

spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# Logging
logging.level.org.hibernate=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.hbm2ddl=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.skillhub.portfolio_skillhub=DEBUG
spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=ADMIN
spring.application.name=Backend

# Server configuration (convention cours)
server.port=8089
server.servlet.context-path=/skillhub

# Configuration de la base de donnees
spring.datasource.url=jdbc:mysql://localhost:3306/PiDB?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuration JPA/Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Timezone et scheduling
spring.jackson.time-zone=UTC
spring.task.scheduling.pool.size=2

# Upload de fichiers (ServiceRequest)
app.upload.service-requests-dir=uploads/service-requests
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# AI coach configuration
ai.coach.enabled=true
ai.coach.base-url=https://api.openai.com/v1/chat/completions
ai.coach.model=gpt-4.1-mini
ai.coach.api-key=

# AI notification assistant
ai.notification.enabled=true
ai.notification.base-url=https://api.openai.com/v1/chat/completions
ai.notification.model=gpt-4.1-mini
ai.notification.api-key=